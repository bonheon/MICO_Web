<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MICO | 접근 권한 없음</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f1729 0%, #1a2744 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .error-card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .error-code {
      font-size: 5rem;
      font-weight: 900;
      color: #e8edf5;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .error-icon {
      font-size: 3rem;
      color: #f59e0b;
      margin: 0.5rem 0 1rem;
    }
    .error-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1e2640;
      margin-bottom: 0.5rem;
    }
    .error-desc {
      font-size: 0.875rem;
      color: #8993a8;
      margin-bottom: 2rem;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.5rem;
      border-radius: 10px;
      background: #4f8ef7;
      color: #fff;
      font-weight: 600;
      font-size: 0.875rem;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-home:hover { background: #3a7ae0; color: #fff; }
    .brand {
      margin-bottom: 1.5rem;
    }
    .brand .logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: #0f1729;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="brand"><span class="logo">MICO</span></div>
    <div class="error-code">403</div>
    <div class="error-icon"><i class="bi bi-shield-x"></i></div>
    <div class="error-title">접근 권한이 없습니다</div>
    <div class="error-desc">
      이 페이지에 접근할 권한이 없습니다.<br>
      권한이 필요한 경우 관리자에게 문의해 주세요.
    </div>
    <a href="/" class="btn-home"><i class="bi bi-house-fill"></i> 홈으로 돌아가기</a>
  </div>
</body>
</html>
