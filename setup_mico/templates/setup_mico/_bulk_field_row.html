<div class="bulk-field-row d-flex align-items-center gap-3 mb-2 py-2" style="border-bottom:1px solid #f0f2f7;">
  <input type="checkbox" name="update_fields" value="{{ field_name }}" id="chk_{{ field_name }}" class="bulk-chk" style="cursor:pointer; flex-shrink:0;">
  <label for="chk_{{ field_name }}" class="fw-semibold mb-0" style="font-size:0.82rem; width:150px; cursor:pointer;">{{ label }}</label>
  <input type="{{ input_type }}" name="bulk_{{ field_name }}" id="inp_{{ field_name }}" class="form-control form-control-sm" disabled style="flex:1;">
</div>
