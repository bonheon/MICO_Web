<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MICO | Skynet 로그인</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f1729 0%, #1a2744 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    }
    .brand {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .brand .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #0f1729;
      letter-spacing: 0.06em;
    }
    .brand .sub {
      font-size: 0.72rem;
      color: #8993a8;
      letter-spacing: 0.04em;
      margin-top: 2px;
    }
    .brand .divider {
      width: 40px;
      height: 3px;
      background: #4f8ef7;
      border-radius: 999px;
      margin: 0.75rem auto 0;
    }
    .skynet-notice {
      background: #f0f6ff;
      border: 1px solid #c7dffe;
      border-radius: 14px;
      padding: 1.5rem 1.25rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .skynet-notice .icon {
      font-size: 2rem;
      color: #4f8ef7;
      margin-bottom: 0.75rem;
    }
    .skynet-notice .title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1e3a6e;
      margin-bottom: 0.5rem;
    }
    .skynet-notice .desc {
      font-size: 0.82rem;
      color: #4a6fa5;
      line-height: 1.6;
    }
    .form-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #344054;
    }
    .form-control {
      border: 1.5px solid #e4e7ed;
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      font-size: 0.875rem;
      transition: border-color 0.15s;
    }
    .form-control:focus {
      border-color: #4f8ef7;
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
    }
    .input-group-text {
      border: 1.5px solid #e4e7ed;
      border-right: none;
      background: #f8f9fc;
      border-radius: 10px 0 0 10px;
      color: #8993a8;
    }
    .input-group .form-control {
      border-left: none;
      border-radius: 0 10px 10px 0;
    }
    .btn-login {
      width: 100%;
      padding: 0.65rem;
      border-radius: 10px;
      background: #4f8ef7;
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #3a7ae0; color: #fff; }
    .error-box {
      background: #fff1f2;
      border: 1px solid #fecdd3;
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      font-size: 0.82rem;
      color: #ef4444;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .divider-or {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0 1rem;
      color: #c0c8d8;
      font-size: 0.78rem;
    }
    .divider-or::before, .divider-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8eaf0;
    }
    .admin-toggle {
      text-align: center;
      font-size: 0.78rem;
      color: #8993a8;
      cursor: pointer;
      user-select: none;
    }
    .admin-toggle:hover { color: #4f8ef7; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="brand">
      <div class="logo">MICO</div>
      <div class="sub">Manufacturing Intelligence Control</div>
      <div class="divider"></div>
    </div>

    <div class="skynet-notice">
      <div class="icon"><i class="bi bi-shield-lock"></i></div>
      <div class="title">Skynet 로그인이 필요합니다</div>
      <div class="desc">
        Skynet에 로그인한 후 다시 접속해 주세요.
      </div>
    </div>

    <!-- 관리자용 로그인 (접힌 상태) -->
    <div class="divider-or">관리자 전용</div>
    <div class="admin-toggle" data-bs-toggle="collapse" data-bs-target="#adminLoginForm">
      <i class="bi bi-chevron-down me-1"></i>관리자 계정으로 로그인
    </div>

    <div class="collapse mt-3" id="adminLoginForm">
      {% if error %}
      <div class="error-box">
        <i class="bi bi-exclamation-circle-fill"></i>
        {{ error }}
      </div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="login_type" value="admin">
        <div class="mb-3">
          <label class="form-label">아이디</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="아이디를 입력하세요" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">비밀번호</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
          </div>
        </div>
        <button type="submit" class="btn btn-login">
          <i class="bi bi-box-arrow-in-right me-1"></i> 로그인
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% if error %}
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      new bootstrap.Collapse(document.getElementById('adminLoginForm'), { show: true });
    });
  </script>
  {% endif %}
</body>
</html>
