<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MICO | Skynet 로그인</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f1729 0%, #1a2744 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    }
    .brand {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .brand .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #0f1729;
      letter-spacing: 0.06em;
    }
    .brand .sub {
      font-size: 0.72rem;
      color: #8993a8;
      letter-spacing: 0.04em;
      margin-top: 2px;
    }
    .brand .divider {
      width: 40px;
      height: 3px;
      background: #4f8ef7;
      border-radius: 999px;
      margin: 0.75rem auto 0;
    }
    .skynet-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #f0f6ff;
      border: 1px solid #c7dffe;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
    }
    .skynet-header .label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #1e3a6e;
    }
    .skynet-badge {
      font-size: 0.65rem;
      background: #4f8ef7;
      color: #fff;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .mock-notice {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      font-size: 0.75rem;
      color: #92400e;
      margin-bottom: 1.25rem;
    }
    .mock-notice .title {
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .mock-notice ul {
      margin: 0.25rem 0 0;
      padding-left: 1.2rem;
    }
    .form-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #344054;
    }
    .form-control {
      border: 1.5px solid #e4e7ed;
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      font-size: 0.875rem;
      transition: border-color 0.15s;
    }
    .form-control:focus {
      border-color: #4f8ef7;
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
    }
    .input-group-text {
      border: 1.5px solid #e4e7ed;
      border-right: none;
      background: #f8f9fc;
      border-radius: 10px 0 0 10px;
      color: #8993a8;
    }
    .input-group .form-control {
      border-left: none;
      border-radius: 0 10px 10px 0;
    }
    .btn-skynet-submit {
      width: 100%;
      padding: 0.65rem;
      border-radius: 10px;
      background: #0f1729;
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      transition: background 0.15s;
    }
    .btn-skynet-submit:hover { background: #1a2744; color: #fff; }
    .error-box {
      background: #fff1f2;
      border: 1px solid #fecdd3;
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      font-size: 0.82rem;
      color: #ef4444;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .back-link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.82rem;
      color: #8993a8;
    }
    .back-link a {
      color: #4f8ef7;
      font-weight: 600;
      text-decoration: none;
    }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="brand">
      <div class="logo">MICO</div>
      <div class="sub">Manufacturing Intelligence Control</div>
      <div class="divider"></div>
    </div>

    <div class="skynet-header">
      <i class="bi bi-shield-lock-fill text-primary"></i>
      <span class="label">Skynet SSO 로그인</span>
      <span class="skynet-badge">MOCK</span>
    </div>

    <!-- 임시 Mock 안내 (실제 Skynet 연동 후 제거) -->
    <div class="mock-notice">
      <div class="title"><i class="bi bi-cone-striped me-1"></i>임시 Mock 모드 (개발 중)</div>
      실제 Skynet 연동 전까지 사번을 직접 입력합니다.<br>
      등록된 테스트 사번:
      <ul>
        <li>2057197 (구본헌 / CMP팀)</li>
        <li>1111111 (테스트유저A / CMP팀)</li>
        <li>2222222 (테스트유저B / PE팀)</li>
      </ul>
    </div>

    {% if error %}
    <div class="error-box">
      <i class="bi bi-exclamation-circle-fill"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label">사번 <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
          <input type="text" name="employee_id" class="form-control"
                 placeholder="사번 7자리 입력" autofocus maxlength="20">
        </div>
      </div>
      <button type="submit" class="btn btn-skynet-submit">
        <i class="bi bi-shield-check me-1"></i> Skynet 인증
      </button>
    </form>

    <div class="back-link">
      <a href="{% url 'login' %}"><i class="bi bi-arrow-left me-1"></i>로그인 페이지로 돌아가기</a>
    </div>
  </div>
</body>
</html>
